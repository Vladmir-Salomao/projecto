<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>parágrafos</title>
</head>
<body>
    <h1>parágrafos e quebra de linhas</h1>
    <hr>
    <p>você pode criar um parágrafo de qualquer jeito.basta colocar tudo dentro de &lt;p&gt; e &lt;/p&gt;</p>
    <p>vamos adicionar símbolos no nosso site</p>
    <!--para adicionar simbolos normalmente usa-se o & e o nome ou possivel nome do simbolo.para encontrar mais símbolos da para buscar alguns na web por misk simbols-->
    <strong style="font-size: 2rem;">
        &trade;<br>
        &pound;<br>
        &euro;<br>
        &dollar;<br>
        &reg;<br>
        &Delta;<br>
        &copy;
    </strong>
    <p>vamos adicionar alguns emojis no nosso site </p>
    <!--para adicionar imojis no site,posso aceder a emojipidia na web que é uma insiclopedia de emogis para pegar os seus pontos de codigo.Os emojis sempre começarão com &#x depois o point code normalmente de 5 digitos-->
    <strong style="font-size: 3rem;">
        &#x1f379;
        &#x1f093;
        &#x1f463;
        &#x1f394; 
    </strong>


</body>
</html>
