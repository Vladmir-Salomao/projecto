<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>centralizar conteudo sem flexbox</title>
    <style>
        :root{
            --cor1: blue;
        }
        div{
            background: url(imagens/target001.png) no-repeat center/cover;
        }
        #a{
            width: 300px;
            height: 300px;
            background-color: var(--cor1);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
        }
        #b{
            height: 98vh;
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div id="b">
        <div id="a"></div>
    </div>
</body>
</html>
